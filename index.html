<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ASCO 2026 My Agenda</title>
<style>
/* ── System font stack — no external network needed ── */
:root{
  --ff: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, monospace;
  --bg:#0A1520; --sf:#111E2E; --sf2:#172030;
  --teal:#00B4A0; --td:#007A6E; --gold:#E8A020;
  --coral:#E05050; --lav:#7B8FD4; --grn:#3DB88A;
  --amb:#F0A030; --pink:#D06090;
  --border:rgba(255,255,255,.08);
  --text:#E8EDF4; --mut:#8099B8; --r:12px; --navy:#0D1B2A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--ff);}
body{padding-bottom:100px;}

/* header */
.hdr{background:linear-gradient(150deg,#0D2040,#0A1520);padding:52px 18px 14px;
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.hdr-r{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr h1{font-size:24px;font-weight:700;line-height:1.2;color:#fff;}
.hdr h1 em{color:var(--teal);font-style:normal;}
.hdr-sub{font-size:13px;color:var(--mut);margin-top:4px;}
.cbadge{background:var(--teal);color:#fff;font-size:13px;font-weight:700;
  padding:3px 9px;border-radius:20px;}

/* day tabs */
.tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
  background:var(--sf);border-bottom:1px solid var(--border);
  position:sticky;top:88px;z-index:90;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  font-size:15px;font-weight:600;color:var(--mut);cursor:pointer;
  white-space:nowrap;font-family:var(--mono);-webkit-appearance:none;
  transition:all .2s;min-height:44px;}
.tab.on{background:var(--teal);color:#fff;border-color:var(--teal);}

/* type filters */
.frow{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg);}
.frow::-webkit-scrollbar{display:none;}
.fc{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:14px;
  font-weight:600;cursor:pointer;border:1.5px solid transparent;
  -webkit-appearance:none;min-height:44px;transition:opacity .2s;}
.fc.dim{opacity:.3;}
.fc-all{background:#fff;color:var(--navy);}
.fc-sess{background:rgba(0,180,160,.18);color:var(--teal);border-color:var(--td);}
.fc-poster{background:rgba(232,160,32,.15);color:var(--gold);border-color:#C47A10;}
.fc-meet{background:rgba(208,96,144,.18);color:var(--pink);border-color:#A04070;}

.cbar{font-size:13px;color:var(--mut);padding:3px 18px;font-family:var(--mono);}

/* content */
.content{padding:10px 16px;display:flex;flex-direction:column;gap:10px;}
.dlbl{display:flex;align-items:center;gap:8px;font-family:var(--mono);
  font-size:13px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;
  padding:6px 0 2px;}
.dlbl::after{content:"";flex:1;height:1px;background:var(--border);}

/* session card */
.card{background:var(--sf);border-radius:var(--r);
  border:1px solid var(--border);overflow:hidden;}
.stripe{height:3px;}
.cbody{padding:12px 14px 14px;}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:8px;}
.cmeta{display:flex;flex-direction:column;gap:4px;}
.ttag{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--teal);
  background:rgba(0,180,160,.1);padding:2px 8px;border-radius:4px;
  display:inline-block;}
.vtag{font-size:13px;color:var(--mut);display:flex;align-items:center;gap:4px;}
.vdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.prio{font-size:18px;flex-shrink:0;}
.pill{display:inline-block;font-size:12px;font-weight:700;padding:2px 8px;
  border-radius:3px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.tja{font-size:17px;font-weight:700;line-height:1.5;color:#fff;margin-bottom:3px;}
.ten{font-size:13px;color:#fff;line-height:1.4;margin-bottom:5px;}
.auth{font-size:13px;color:var(--teal);margin-bottom:5px;}
.ktags{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0;}
.ktag{font-size:12px;font-weight:600;padding:1px 6px;border-radius:10px;
  background:rgba(123,143,212,.15);color:var(--lav);
  border:1px solid rgba(123,143,212,.2);}
.cnote{font-size:13px;color:var(--amb);background:rgba(240,160,48,.1);
  border-left:2px solid var(--amb);padding:5px 9px;
  border-radius:0 4px 4px 0;margin-top:7px;line-height:1.5;}
.cwarn{font-size:13px;color:var(--coral);background:rgba(224,80,80,.1);
  border-left:2px solid var(--coral);padding:5px 9px;
  border-radius:0 4px 4px 0;margin-top:5px;line-height:1.5;}
.sy{color:var(--teal);font-size:12px;font-weight:600;}
.sn{color:var(--coral);font-size:12px;}

/* abstract toggle — using <button> for iOS tap reliability */
.abs-toggle{display:flex;align-items:center;gap:6px;margin-top:8px;
  padding:10px 12px;background:var(--sf2);border-radius:8px;
  cursor:pointer;border:1px solid var(--border);width:100%;text-align:left;
  -webkit-appearance:none;min-height:44px;}
.abs-toggle-label{font-size:14px;font-weight:600;color:var(--teal);}
.abs-toggle-hint{font-size:12px;color:var(--mut);margin-left:4px;}
.abs-arr{font-size:14px;color:var(--mut);margin-left:auto;
  transition:transform .25s;display:inline-block;}
.abs-toggle.open .abs-arr{transform:rotate(180deg);}
.abs-body{display:none;margin-top:6px;padding:10px 12px;
  background:var(--sf2);border-radius:8px;border:1px solid var(--border);}
.abs-body.open{display:block;}
.abs-sec-title{font-size:12px;font-weight:700;color:var(--gold);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;margin-top:8px;}
.abs-sec-title:first-child{margin-top:0;}
.abs-sec-text{font-size:15px;line-height:1.7;color:var(--text);}

/* sub-abstract inside session */
.subabs{background:var(--sf2);border-radius:8px;padding:9px 11px;
  margin-top:7px;border:1px solid var(--border);}
.sa-num{font-family:var(--mono);font-size:12px;color:#fff;margin-bottom:3px;}
.sa-ja{font-size:15px;font-weight:600;color:#fff;line-height:1.4;margin-bottom:2px;}
.sa-en{font-size:13px;color:#fff;line-height:1.4;margin-bottom:3px;}
.sa-auth{font-size:13px;color:var(--teal);margin-bottom:4px;}
/* sub-abstract toggle — also <button> */
.sa-toggle-btn{font-size:13px;color:var(--teal);
  background:transparent;border:none;cursor:pointer;
  padding:4px 0;-webkit-appearance:none;min-height:36px;
  text-align:left;display:block;}
.sa-body{display:none;margin-top:6px;padding:8px 10px;
  background:var(--bg);border-radius:6px;border:1px solid var(--border);}
.sa-body.open{display:block;}
.sa-body-text{font-size:14px;line-height:1.7;color:var(--text);}

/* poster card */
.pcard{background:var(--sf2);border-radius:var(--r);
  border:1px solid var(--border);overflow:hidden;}
.pcbody{padding:12px 14px;}
.pnum{font-family:var(--mono);font-size:13px;color:#fff;
  background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.2);
  padding:1px 7px;border-radius:3px;display:inline-block;margin-bottom:5px;}
.ptja{font-size:16px;font-weight:700;line-height:1.5;
  color:#fff;margin-bottom:3px;}
.pten{font-size:13px;color:#fff;line-height:1.4;margin-bottom:4px;}
.pauth{font-size:13px;color:var(--teal);margin-bottom:4px;}

/* meeting card */
.mcard{background:var(--sf);border-radius:var(--r);
  border:1px solid rgba(208,96,144,.35);overflow:hidden;}
.mcard-top{height:4px;
  background:linear-gradient(90deg,var(--pink),#8040A0);}
.mcard-body{padding:12px 14px 14px;}
.mcard-badge{display:inline-flex;align-items:center;gap:4px;
  background:rgba(208,96,144,.15);color:var(--pink);
  font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;
  margin-bottom:8px;}
.mcard-time{font-family:var(--mono);font-size:14px;font-weight:500;
  color:var(--pink);background:rgba(208,96,144,.12);
  padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:4px;}
.mcard-venue{font-size:13px;color:var(--mut);margin-bottom:8px;line-height:1.5;}
.mcard-org{font-size:18px;font-weight:700;color:#fff;
  line-height:1.3;margin-bottom:4px;}
.mcard-dis{display:inline-block;font-size:12px;font-weight:700;
  padding:1px 7px;border-radius:10px;background:rgba(208,96,144,.15);
  color:var(--pink);border:1px solid rgba(208,96,144,.25);
  margin-bottom:5px;}
.mcard-lead{font-size:13px;color:var(--teal);margin-bottom:6px;}
.mcard-desc{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:6px;}
.mcard-url{font-size:13px;color:var(--teal);
  word-break:break-all;display:block;margin-top:4px;}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,27,42,.96);-webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);border-top:1px solid var(--border);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));
  display:flex;justify-content:space-around;z-index:200;}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:12px;font-weight:500;color:var(--mut);
  padding:4px 14px;border:none;background:transparent;cursor:pointer;
  font-family:var(--ff);-webkit-appearance:none;min-height:44px;}
.nbtn.on{color:var(--teal);}
.nbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.empty{text-align:center;padding:60px 20px;color:var(--mut);font-size:16px;}
/* ── Bookmark / Check feature ── */
.bm-btn{position:absolute;top:10px;right:12px;background:transparent;border:none;
  cursor:pointer;font-size:22px;line-height:1;-webkit-appearance:none;
  padding:4px;min-height:36px;min-width:36px;}
.bm-btn:active{transform:scale(1.3);}
.card{position:relative;}
.pcard{position:relative;}
.mcard{position:relative;}
.bm-bar{background:var(--sf2);border-radius:8px;padding:6px 14px;
  margin:4px 16px 0;font-size:13px;color:var(--gold);
  display:flex;align-items:center;gap:6px;}
.fc-bm{background:rgba(232,160,32,.18);color:var(--gold);border-color:#C47A10;}

</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-r">
    <div>
      <h1>ASCO <em>2026</em> My Agenda</h1>
      <div style="font-size:14px;color:var(--teal);margin-top:2px;font-weight:600;">
        ver.4 — 抄録要約 + 面会予定</div>
      <div class="hdr-sub">抄録全文（874p）より抽出・日本語要約 | 面会予定含む | All times CDT</div>
    </div>
    <div class="cbadge" id="cbadge">—</div>
  </div>
</div>

<div class="tabs" id="dayTabs">
  <button class="tab on" data-day="all">全日程</button>
  <button class="tab" data-day="1">5/29 金</button>
  <button class="tab" data-day="2">5/30 土</button>
  <button class="tab" data-day="3">5/31 日</button>
  <button class="tab" data-day="4">6/1 月</button>
</div>

<div class="frow" id="frow">
  <button class="fc fc-all"    data-t="all">すべて</button>
  <button class="fc fc-sess"   data-t="session">セッション</button>
  <button class="fc fc-poster" data-t="poster">ポスター</button>
  <button class="fc fc-meet"   data-t="meeting">👥 面会</button>
  <button class="fc fc-bm"     data-t="bookmarked">⭐ チェック済み</button>
</div>

<div class="cbar" id="cbar"></div>
<div class="content" id="content"></div>
<div class="empty"   id="empty" style="display:none">該当なし</div>

<div class="bnav">
  <button class="nbtn on" id="btnTop">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/></svg>トップ
  </button>
  <button class="nbtn" id="btnStar">
    <svg viewBox="0 0 24 24">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
    </svg>★★★のみ
  </button>
  <button class="nbtn" id="btnReset">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 109 9"/>
      <polyline points="3,7 3,12 8,12"/></svg>リセット
  </button>
</div>

<script>
"use strict";

/* ── Bookmarks: stored in sessionStorage (survives page reload, not tab close) ── */
var BOOKMARKS = {};
try {
  var stored = sessionStorage.getItem("asco2026_bm");
  if(stored) BOOKMARKS = JSON.parse(stored);
} catch(e){}

function saveBM(){
  try{ sessionStorage.setItem("asco2026_bm", JSON.stringify(BOOKMARKS)); }catch(e){}
}
function isBM(id){ return !!BOOKMARKS[id]; }
function toggleBM(id){
  if(BOOKMARKS[id]) delete BOOKMARKS[id];
  else BOOKMARKS[id] = true;
  saveBM();
  render();
}
var SUMS = {
  "103":{bg:"FMISO PET（機能的低酸素イメージング）で選択したHPV関連中咽頭がん患者に、大幅な放射線量減量を行った場合の長期アウトカムを報告。3つの連続した第II相試験の統合分析（10施設）。T0–3/N1–2c HPV+中咽頭がん患者を対象に、低酸素画像が良好な患者には大幅減量、不良な患者には標準線量を投与。",meth:"機能的低酸素イメージング（FMISO PET）でスクリーニング → 良好群：大幅線量減量 → 不良群：標準線量。主要評価項目：局所コントロール率、毒性、QOL。",pnt:"患者のQOL改善と晩期毒性軽減を目標とした「患者中心」の治療減量研究。エンドポイントの設計がpatient-centeredの典型例。"},
  "104":{bg:"悪性腹水（MA）は進行がん（胃・大腸・卵巣）の重篤な合併症で、症状負担が大きく、全身療法の有効性を低下させ、QOLを著しく損なう。標準治療の腹腔穿刺は一時的な症状緩和のみ。M701（EpCAM×CD3二重特異性抗体）の腹腔内投与と腹腔穿刺を比較するPhase 3 RCT。",meth:"標準療法失敗後の進行胃がん・大腸がん・卵巣がんのMA患者をランダム化。主要評価項目：腹水コントロール率、症状スコア、QOL（EORTC QLQ-C30）、OS。",pnt:"症状負担・QOL・患者体験を主要評価項目とするPhase 3試験。このCSSで取り上げられる理由はpatient-centered endpointsの選択法の具体例として。"},
  "105":{bg:"ESOPEC試験では周術期化学療法（FLOT）が術前化学放射線療法（CROSS）より切除可能食道腺がんの生存を改善することが既に示された。この発表はPROを副次的評価項目として報告。PRO測定：EORTC QLQ-C30（全般的健康状態）、OES18（食道特異的）、CIPN20（末梢神経障害）をベースライン・治療中・フォローアップ時に測定。",meth:"cT1 cN+ cM0またはcT2-4a cNany cM0食道腺がん患者をFLOT vs CROSSにランダム化。PRO：ベースライン→治療中→術後→定期フォローアップにわたる全般的健康状態の変化を解析。",pnt:"Phase 3 RCTのPRO副次評価項目の発表。抄録内のCSS「患者の声を高める」セッションで直接議論される演題。治療選択と患者QOLのバランスをどう測定するかの実例。"},
  "1501":{bg:"がん臨床試験への登録不足は研究進歩の大きな障壁。少数の患者のみが試験を提案され、事前スクリーニングは手作業で労力がかかる。AI（TRIAGE：Trial Recommendations using Intelligent Assessment to Guide Eligibility and Enrollment）を用いた中央集中型患者スクリーニングシステムの専門家による検証。",meth:"大規模コミュニティ・学術混合がんセンターで後向き研究。629患者・4,094患者-試験ペアをトレーニングデータとして使用。AIシステムのパフォーマンスをCRC専門家の判定（ゴールドスタンダード）と比較。LLMのみのソリューションも比較対象。",pnt:"CRC判定をゴールドスタンダードとして、AIシステムを検証。CRCの役割とAIの関係を示す重要演題。"},
  "1516":{bg:"IMGは米国血液腫瘍学・内科腫瘍学の人材の38%を占める（AAMC調査）。農村部・医療専門家不足地域（HPSA）での腫瘍医の地理的分布とIMGステータスの関連を解析。",meth:"Medicare Care Compareで血液腫瘍学・内科腫瘍学専門医を特定。IMG定義：米国・プエルトリコ・カナダ以外の医学部卒業。51%はCare Compareから、43%はAMA Masterfleから、6%欠損分はGeminiで補完。農村郡・HPSA郡でのIMGステータスをクロス集計。",pnt:"地理的格差解消におけるIMGの役割を定量化。workforce diversityとアクセス格差の関係。"},
  "1520":{bg:"乳がん治療のfinancial toxicity（FT）は心理的ウェルビーイング・治療アドヒアランス・QOLに悪影響を及ぼす。財政ナビゲーション（FN）は有効な戦略として提案されているが、高品質RCT証拠は限られていた。",meth:"二重盲検評価者盲検・並行群間RCT。アジュバント療法中の成人女性乳がん患者（n=82、41人/群）。介入：個別ニーズ評価・費用関連情報提供・保険/補助金ナビゲーション・地域リソース紹介。主要評価項目：3か月時点のFT（COSTスコア）。",pnt:"財政ナビゲーション介入の高品質RCTエビデンス。中国からのデータで国際的視点。"},
  "1521":{bg:"ACPはすべてのがん患者に推奨されているが、臨床医の時間不足・報酬不十分・workforce不足などの多層的障壁により参加率が低い。CHW主導のグループ型ACPアプローチが個別介入と比較してスケール可能か。",meth:"前向きRCT：1か月のCHW主導グループACP教育介入+通常ケアvs通常ケアのみを比較。アウトカム：ACP文書化率・患者/家族満足度・緩和ケア紹介・ホスピス入院。",pnt:"人手不足の中でACP教育をスケールする実践的手法。workforce shortage対策としての集団介入モデル。"},
  "1536":{bg:"建築環境とがんアウトカムの関連が増加するエビデンスがある。NCCNはがんケアにおける交通アクセスの重要性を強調。がん患者、特に高齢者は、頻繁な医療受診と治療関連のFTにより、交通アクセス不足に脆弱。",meth:"NIH All of Usコホートの成人がん患者31,126人のデータを分析（歴史的に研究で過少代表されてきた集団を含む）。公共交通機関からの距離と自己申告のQOL・疼痛・倦怠感の関連を多変量順序ロジスティック回帰で解析。",pnt:"交通アクセスがFTとQOLの構造的決定因子であることを大規模データで示す。社会的決定因子研究。"},
  "1537":{bg:"がんケアへの長い移動時間が悪い予後とQOLに関連することが知られている。移動時間とケアアクセス・交通苦痛・financial toxicityの関連を検討。",meth:"Cancer Experience Registry（CER）参加者（2021年10月–2025年12月）が、社会人口統計・臨床情報・financial toxicity（FACIT-COST 11項目）・がんケアへの移動時間（分/時間）・交通苦痛（1–5スケール）・ケアアクセスの遅延/障壁（yes/no）を自己申告。",pnt:"Time toxicity × financial toxicityの交差を実測した唯一レベルの研究。Cancer Support Communityの大規模レジストリデータ使用。"},
  "1581":{bg:"閉経前乳がん患者では、長期の内分泌療法（leuprolide・denosumab）が繰り返しの外来注射を必要とし、大きな時間負担とアドヒアランス課題を生む。遠隔医療支援の在宅注射プログラムの実現可能性を評価。",meth:"4つの外来腫瘍学診療所（2024年10月–2025年1月）から患者を募集。遠隔医療受診での評価後、在宅看護師注射訪問を実施。実現可能性・患者体験・満足度・アドヒアランスを評価。",pnt:"外来注射のTime toxicity軽減。患者体験改善と治療アドヒアランス向上の両立を目指したケアデリバリー革新。"},
  "1585":{bg:"早期がん試験は医学的に複雑な患者と狭い登録ウィンドウを含む。従来のCRC役割はデータ管理とスケジューリングに限定され、患者対面ワークフローへの統合が限られ、プロトコル実施とプレスクリーニングにギャップが生じていた。",meth:"バイオマーカー主導の第I相試験でCRCを患者対面ワークフローに組み込むパイロット。CRCが研究者・研究看護師と患者受診に同席。実施内容：標準化された患者スケジュール教育・CRC主導の週次計画・リアルタイムプロトコルサポート・前向きスクリーニングサポート。評価：プロトコル逸脱率・登録効率・患者満足度・多職種連携指標。",pnt:"CRC主導ケアデリバリーモデルの実践パイロット。CRCの役割拡大・患者中心の試験実施強化の直接的エビデンス。"},
  "1592":{bg:"がん負担の測定は生存研究・医療システム設計・政策に情報を提供する。既存アプローチは構造化PROMs依存でコスト高・文化的制約・グローバルスケール困難。AIのLLMsが非構造化患者ナラティブを大規模に分析する機会を提供。",meth:"成人がん患者・サバイバーが構造化負担評価（Likert）AND自由記述ナラティブを提供。LLM主導フレームワークが自由記述から多次元がん負担を評価し、構造化評価と照合検証。複数国・複数施設でのグローバル協調。",pnt:"構造化PROMs以外で患者の声を捉える革新的アプローチ。AIを用いた患者体験のグローバル測定。Lancet委員会との連携。"},
  "9004":{bg:"グローバル腫瘍科workforce計画は予測モデルに依存するが、ベースライン階層化に高度に敏感。歴史的モデルは広い地理的地域を使用し、地域内の経済的不均質性を隠す。",meth:"査読文献・政府/省庁報告・ESMO・ASCOデータセットから腫瘍科workforce データを抽出。がん罹患率・人口予測はGLOBOCANとUN。Workforce負担 = がん症例数当たりの腫瘍医数。地域別vs所得階層化予測モデルを比較。",pnt:"2050年の腫瘍科人材不足を定量化。グローバルworkforce crisisの数値的予測。"},
  "9009":{bg:"米国腫瘍医のバーンアウトは2013年の34%から2023年の59%に上昇、グローバル推計32–45%。過去10年で米国腫瘍医の約20%が臨床業務を離脱。バーンアウトは充実度・離職意向と切り離して研究されてきた。",meth:"匿名横断的グローバル調査（2025年10月–12月）。バーンアウト評価：Maslach Burnout Inventory（MBI）検証済み項目。職業的充実感・キャリアへの後悔・臨床業務離職意向との関連を評価。",pnt:"腫瘍医のバーンアウト・充実度・離職意向のグローバルデータ。Workforce crisis定量化の重要エビデンス。"},
  "9041":{bg:"APP（ナースプラクティショナー・フィジシャンアシスタント）は腫瘍チームの重要メンバーだが、臨床試験への活用は歴史的に限定的。NCI政策変更（2020–2021）でAPP役割拡大が可能に。UH Cancer Center/Hawaii NCORPでのAPP正式活用の影響を測定。",meth:"臨床試験管理システムから年次APPデータを収集（2021–2025年）。測定指標：APPが署名した試験プロトコルコンセント・実施した研究受診・安全性報告・規制提出。促進要因と障壁を特定。",pnt:"5年間の実世界データ。APPがCRCと補完的に機能するNCORP内の試験実施モデル。Workforce拡大の実証。"},
  "11004":{bg:"ePROモニタリングが進行がん患者のQOLと生存を改善することが先行RCTで示唆されているが、西洋医療以外での証拠は限られている。日本人患者でのePROの有用性（OS・HR-QOL）を評価する多施設RCT（PRO-MOTE）。",meth:"18歳以上・ECOG PS 0–2・全身療法中の進行固形腫瘍患者をePROモニタリング群vs通常ケア群に1:1ランダム化。治療期間中に毎週ePRO症状調査（閾値超過で医療チームにアラート）。主要評価項目：OS・HR-QOL（FACT-G、FACT-T）。",pnt:"日本からの多施設RCT。非西洋設定でのePRO有効性を検証。国際的なPRO研究への貢献。"},
  "11005":{bg:"ePROベースのRTM（リモート治療モニタリング）がケアチームの早期対応と急性期ケアイベント回避を可能にするがリアルワールド証拠は限られている。Canopy ePROプラットフォームのRTMが急性期ケアに与える影響を評価。",meth:"5つの地域腫瘍学施設で転移性固形腫瘍患者1,549人を研究（2024年1月–2025年7月）。週次ePRO症状調査・閾値超過で専任トリアージ看護師に通知・電話/緊急外来/ER紹介を検討。RTM群（45日以内に2回以上ePRO提出）vs非RTM群で急性期ケアイベントを比較。",pnt:"地域腫瘍学実臨床でのePRO RTMの効果。急性期ケア削減・コスト削減のリアルワールドエビデンス。"},
  "11008":{bg:"若年発症大腸がん（50歳未満）の増加。患者は特有の課題に直面（仕事・育児・経済的問題など）。専任ケアコーディネーターが多次元的支援サービスへのアクセスを改善できるか。",meth:"50歳未満の新規診断CRC患者（2023–2025）に、通常の多職種ケアvs通常ケア+ケアコーディネーター面談（YOCRCプログラム）を割り当て。初回受診時に患者報告の懸念と苦痛を収集。主要評価項目：支援サービス（心理・社会・栄養・遺伝・生殖・経済・その他）の利用率。",pnt:"がん特有の課題に対するcare coordinationの実用的試験。Patient centricityとspecialized supportの実践例。"},
  "11025":{bg:"HR+乳がんのAET（アジュバント内分泌療法）はアドヒアランス不良が多い。手動スクリーニングは煩雑。EHR構造化データを用いたインフォマティクス支援スクリーニングがコーディネーター時間を削減できるかを検討。",meth:"Mayo Clinicでの2段階アプローチを分析：(1) EHR構造化データ（診断日・病期・ER/PR/HER2陽性・薬剤処方）での自動プレスクリーニング、(2) 詳細チャートレビュー。各ステップでのコーディネーター時間と精度を計測。複数施設での変動を評価。",pnt:"CRC・コーディネーター業務効率化の直接的エビデンス。インフォマティクスで試験負担を軽減する実践的アプローチ。"},
  "11049":{bg:"財政的困窮はがん患者の転帰悪化と関連。CREDIT（SWOG S1912CD）は財政ナビゲーション介入vs通常ケアを評価する全国前向きRCT。試験登録者のベースライン財務特性を報告。",meth:"転移性/ステージIV固形腫瘍または血液悪性腫瘍診断から6か月以内。329人をランダム化（2021年7月–2024年12月）。自己申告データ（教育・就業・収入・保険）と信用データを組み合わせてFTのベースライン状況を評価。",pnt:"Financial toxicityの実態とRCT介入試験のベースラインデータ。SWOG大規模試験からのリアルワールド財務状況。"},
  "11057":{bg:"がんケアは時間集約的だが、特定タスクの時間負担が患者苦痛に与える影響は不明。がんケア関連の具体的タスクに費やす時間と患者苦痛の関連を評価し、最脆弱集団を特定する。",meth:"ミネソタ大学・アラバマ大学バーミンガム校で進行卵巣がん・転移性乳がん治療中の患者を登録。28日間、モバイルアプリで「外出」と「在宅」のがんケア関連タスク時間を記録。毎日の苦痛をNCCN苦痛温度計（0–10）で測定。主要評価項目：がんケア時間と苦痛の関連。",pnt:"Time toxicityの初の体系的実測研究。タスク別の時間記録とウェルビーイングの関連を直接評価。モバイルアプリを用いた実測データ。"},
  "11061":{bg:"腫瘍研究での構造的患者パートナーシップの重要性は認められているが、がん試験グループとがんチャリティが連携してシステムワイドに患者パートナーシップを持続する方法は不明。",meth:"CTI（Cancer Trials Ireland）のPatient Consultants Committee（2016年発足）の開発・実施を回顧的にレビュー。アイルランドがん学会（ICS）の役割（資金・戦略的整合・パブリックエンゲージメント）を検討。組織的な学習・障壁・成功要因を分析。",pnt:"全国的な患者パートナーシップモデルの10年近くの実装経験。Cancer Trials IrelandとICS（患者アドボカシー団体）の協働モデル。"},
  "11092":{bg:"がん臨床試験の登録不足は長年の課題。従来の対策は患者の知識・態度・信念・財政的/実際的障壁・不信感に焦点。教育介入で試験へのアクセスを民主化し登録を改善できるか。",meth:"3施設のがんセンターで乳がん・肝がん・肺がん患者の治療決定時点に、コンセント後に臨床試験全般について教育し、試験マッチリストを腫瘍医・患者に提供。時系列介入（INT）として実施。教育前後での登録率・患者の試験理解を比較。",pnt:"患者が試験に参加しない理由の実態とCRCによる教育介入の効果。Patient preference・patient education・trial participation障壁の解決策。"},
  "11112":{bg:"PROgress Trackerは倫理承認済みの非介入PROレジストリで、患者アドボカシー団体Breast Cancer Canada主導のピアツーピアモデル。初期結果として年齢・病期・分子サブタイプ別の疾患不安の性質と強度を報告。",meth:"2023年開始、10年間でカナダのステージ0–IV乳がん患者をエンロール。参加者は自己紹介入し、検証済みPROMs（人口統計・社会経済・臨床・全体的ウェルビーイング）をデジタルプラットフォームで四半期ごとに記録。AIを用いたリアルワールド分析（2026年1月）。",pnt:"患者アドボカシー団体主導のPROレジストリ。患者が中心となったデータ収集・研究の実践モデル。"},
  "12032":{bg:"緩和ケアはEOLアウトカムを改善するが（在宅死亡率向上など）、アクセスは緩和ケア医師の地理的分布格差により不公平。郡レベル緩和ケア医師密度とがん死亡場所の関連を検討。",meth:"CDC WONDER多死因データ（2021–2023）とAMA Physician Masterfile緩和ケア医師供給データを連結。主要曝露：郡レベル緩和ケア医師密度（10万人当たり）。主要評価項目：がん死亡場所（病院vs在宅/ホスピスなど）。社会経済的決定因子（貧困・保険・人種）も調整。",pnt:"Palliative care workforce格差と患者preference（死亡場所選好）の関連を全国データで示す。緩和ケア医師のworkforce分配問題の定量化。"},

  "1508":{bg:"WHOの必須抗がん薬リスト（EML）の薬剤は低所得国では金銭的にアクセスできないことが多い。ネパールをケーススタディとして、WHO EML抗がん薬の入手経路と実際の価格をマッピングし、費用負担能力を定量化。",meth:"ネパールの流通業者・製造業者の価格リスト（2024〜2026年）から患者価格を抽出。標準用法・投与サイクル数を用いてレジメンコストを推計。主要評価項目：年間一人当たりGDPに対するレジメンコストの比率（費用負担能力指標）。",pnt:"低所得国のfinancial toxicity・薬剤アクセス格差の実態を数値化。日本の患者アドボカシー活動の国際的視点として重要。"},
  "1513":{bg:"多発性骨髄腫（MM）患者は著しいQOL低下・倦怠感・心理的苦痛を抱えているが、アクセスしやすくスケーラブルな支持療法介入は限られている。自己誘導型心理社会的デジタルアプリ（THRIVE-MM）のRCT。",meth:"Massachusetts General Hospital単施設RCT。新規・再発・維持療法中のMM患者を1:1にランダム化（THRIVE-MM群vs通常ケア群）。8週間のアプリアクセス提供。主要評価項目：8週時点のQOL（FACT-MM）。",pnt:"Patient experience・QOL改善・デジタルヘルス介入の患者中心設計の実践例。"},
  "1514":{bg:"神経膠芽腫のケアは定期外来中心に組織されているが、症状管理・意思決定・介護者の責任は外来以外にも及ぶ。患者向けデジタルツールの外来間での活用を評価。",meth:"Ember Health Inc開発の患者向けデジタルツールの実装研究。外来受診外での症状報告・情報アクセス・意思決定支援の利用パターンを分析。",pnt:"Patient experience・デジタル患者ナビゲーション・外来以外でのケア継続性。"},
  "1515":{bg:"ペムブロリズマブ単剤は標準3週毎（q3wk）投与が一般的だが、6週毎（q6wk）延長投与も承認されている。遠隔医療訪問を用いて延長投与をサポートし医療受診を減らす実用的試験。",meth:"Memorial Sloan Kettering Cancer Centerでの実用的試験。遠隔医療訪問でq6wkペムブロリズマブ投与をサポートし、急性期ケア受診・患者体験・医療コストを評価。",pnt:"Time toxicity軽減・遠隔医療によるケアデリバリー効率化の実践例。"},
  "1518":{bg:"遠隔緩和ケア（telepalliative care）のタイミングが進行がん患者の終末期アウトカムに与える影響を多施設後向きコホートで研究。",meth:"Oncoclinicas（ブラジル）多施設後向きコホート。遠隔緩和ケア初回接触の時期（診断からの期間）と終末期ケアアウトカム（ホスピス利用・ICU死亡率・積極的治療）の関連を解析。",pnt:"Patient preference・緩和ケアへのアクセス・遠隔医療の患者アウトカムへの影響。"},
  "1519":{bg:"入院がん患者は生命を脅かす疾患について話し合うことへの需要が高いが、シリアスイルネスの会話は時間的に困難。LLM（大規模言語モデル）が生成したシリアスイルネス会話サマリーが患者ケアを改善できるか。",meth:"Dana-Farber Cancer Instituteパイロット臨床試験。LLMが電子カルテから自動生成したシリアスイルネス会話サマリーを臨床チームに提供。患者・医療者の満足度・ゴールオブケアの文書化率を評価。",pnt:"Patient interview・goals of care・AIを用いた患者中心コミュニケーション支援。"},
  "1520":{bg:"乳がん治療のfinancial toxicity（FT）は心理的ウェルビーイング・治療アドヒアランス・QOLに悪影響。財政ナビゲーション（FN）介入のRCTエビデンス。",meth:"アジュバント療法中の成人女性乳がん患者（n=82、41人/群）。FN介入：個別ニーズ評価・費用関連情報・保険/補助金ナビゲーション・地域リソース紹介。主要評価項目：3か月時点のFT（COSTスコア）。",pnt:"Financial toxicityへの財政ナビゲーション介入の高品質RCTエビデンス。中国からの国際データ。"},
  "1521":{bg:"ACPはすべてのがん患者に推奨されるが、臨床医の時間不足・報酬不十分・workforce不足により参加率が低い。グループ型CHW主導ACP教育介入の効果を検証するRCT。",meth:"1か月のCHW主導グループACP教育介入+通常ケアvs通常ケアのみのRCT。アウトカム：ACP文書化率・患者/家族満足度・緩和ケア紹介・ホスピス入院。",pnt:"人手不足下でのACPスケール化。Patient preference・goals of care・workforce効率的介入モデル。"},
  "11012":{bg:"遠隔医療はCOVID-19以降急速に普及。がん終末期（EOL）患者にとって特に関連性が高い。遠隔医療利用とEOLケアアウトカムの関連をMedicareデータで検討。",meth:"Medicare TM・MA 100%クレームデータを使用。2020〜2023年に死亡した66歳以上のがん患者。死亡前最終1年間の遠隔医療利用と、EOLケア（ホスピス利用・ICU死亡率・化学療法）の関連を解析。",pnt:"Patient preference・終末期ケアのアクセスと質・遠隔医療の格差解消への貢献。"},
  "11015":{bg:"早期相臨床試験（EPCT）参加者のQOLと希望の縦断的変化。試験参加がもたらす心理的影響の把握は、patient experienceと試験デザイン改善に重要。",meth:"Massachusetts General HospitalのEPCT参加者を対象に縦断的調査。QOL（FACT-G）・希望（Herth Hope Index）をベースライン・4週・8週・12週に測定。経時的変化と予測因子を解析。",pnt:"Patient experience in clinical trials・patient-reported outcomes・CRC関連（試験参加者のウェルビーイング）。"},

  "1522":{bg:"就労はがん治療の重要な患者体験の一部。乳がん治療中の職場復帰支援介入TEAMWork（英語・スペイン語）を冊子またはモバイルアプリで提供。デジタルvs印刷配布の効果を比較した実用的研究。",meth:"乳がん術前・術後補助療法を受ける女性に冊子またはモバイルアプリを提供。主要アウトカム：就労維持・職場の合理的配慮の活用・治療完遂率。",pnt:"Patient experienceとしての就労継続。Financial toxicityの予防的介入の観点から重要。"},
  "1524":{bg:"転移性乳がん患者におけるNGS（次世代シークエンシング）検査の格差が問題。英語力がNGS完了率に与える影響と、スペイン語話者に対する翻訳方法（機械翻訳・専門通訳など）の理解度を評価。",meth:"UT Southwestern の転移性乳がん患者コホート。英語力（LEP status）とNGS完了率の関連を解析。各翻訳方法（機械翻訳・専門通訳・バイリンガルスタッフ）の理解度スコアを比較。",pnt:"言語・文化的格差とがんケアアクセス。Patient centricityの観点から言語対応が重要。"},
  "1528":{bg:"多職種メラノーマケアは予後改善に関連するが、アクセスが限られている。デジタル患者ナビゲーションが地理的・社会的障壁を超えて多職種ケアへのアクセスを拡大できるかを評価。",meth:"Johns Hopkins Sidney Kimmel での実装研究。デジタルナビゲーションツールを用いた多職種チームへの紹介率・患者満足度・アクセス障壁の解消を評価。",pnt:"Patient navigationのデジタル化・スケールによるtime toxicity軽減とケアアクセス格差解消。"},
  "1532":{bg:"交通手段の不安は医療受診・治療継続の障壁。多発性骨髄腫患者の輸血頻度は高く、交通手段不安との関連がQOLに影響する可能性。ニューメキシコ州のCRIISデータで解析。",meth:"CRIIS（Cancer Research Integrated Information System）の州全体データ（2013〜2019年）。交通手段の不安指標と輸血頻度の関連を解析。",pnt:"Time toxicity・financial toxicityとしての交通アクセス問題。地域格差と治療負担の具体的なデータ。"},
  "1533":{bg:"大腸がんは50歳未満に急増。貧困地域の若年者は死亡率が高いが、臨床試験登録でも格差がある。近隣の社会的脆弱性指数（SVI）と大腸がん臨床試験登録の関連を年齢別に解析。",meth:"Rutgers Robert Wood Johnsonの大腸がん患者コホート。Census tract SVIと臨床試験登録率の関連を50歳未満・以上で層別解析。",pnt:"CRCの観点から：社会的脆弱性が高い地域からの試験登録拡大の必要性を示すデータ。"},
  "1552":{bg:"うつ・不安はがん患者の20〜40%に影響するが、Medicaid・BIPOC患者の行動医療へのアクセスは特に限られている。バーチャル協働行動医療介入が健康公平性を改善できるか。",meth:"Sarah Cannon Research InstituteでのMedicaid保険・BIPOC患者を対象としたバーチャル行動医療介入の実装研究。うつ・不安スコア・参加率・患者体験を評価。",pnt:"Health equity・patient experience・文化的に適切なケアの実践例。"},
  "1560":{bg:"AYA（15〜39歳）のがん患者は歴史的に臨床試験への参加率が低く、小児患者と比較しても限られている。2004〜2021年の米国全国データでAYAの試験参加傾向を評価。",meth:"米国国家データベースを用いた縦断的解析。AYAがん患者の臨床試験参加率の経時的変化、疾患タイプ別・人種別・施設タイプ別の差異を解析。",pnt:"Patient advocacy for AYA・trial participation格差・diversity in clinical trials。"},
  "1561":{bg:"がんサバイバーの財政的脆弱性は予後に影響するが、退役軍人（Veterans）とVA医療利用による差異は不明。National Health Interview Survey（2020〜2024）で解析。",meth:"NHIS 2020〜2024データ。退役軍人vs非退役軍人のがんサバイバーにおける財政的脆弱性（医療費未払い・経済的困窮・保険不安定）の差異を解析。",pnt:"Financial toxicityと医療制度へのアクセスの関係。Veterans populationのspecific needs。"},
  "1569":{bg:"患者報告のパフォーマンスステータス（PS）は医師評価PSと異なる可能性があり、患者体験の実態を反映。進行がん患者の転帰予測と支持療法ニーズの特定に患者報告PSが有用かを評価。",meth:"UCLA Division of Hematology-OncologyでのECOG PS自己報告と医師評価PSの比較。患者報告PS・医師評価PS・実際の転帰（入院・OS）・支持療法紹介率の関連を解析。",pnt:"Patient-reported outcomesとしてのPS評価。患者視点からの機能状態評価の重要性。"},
  "1572":{bg:"臨床試験は歴史的に人種・民族的少数派を過少登録してきた。evERA乳がん試験（Phase III）での疫学的に代表的な登録と社会的決定因子（SDOH）の組み込みを報告。",meth:"evERA試験（NCT05306340）の登録データ解析。人種・民族・SDOH指標（収入・教育・住宅・保険）の分布と、疫学的期待値との比較。",pnt:"Diversity・equity in clinical trials・SDOHを組み込んだ試験デザインの実践例。"},
  "1584":{bg:"リハビリテーションはがんの全病期にわたって有益であることが示されているが、実際の提供は一貫していない。集団レベルのデータを用いてがんサバイバーのリハビリテーション未充足ニーズを定量化。",meth:"Mayo Clinic Rochesterの集団データ。がんサバイバーのリハビリニーズ（理学療法・作業療法・言語療法）と実際の利用率の乖離を解析。リハビリ未提供の予測因子も特定。",pnt:"Patient experience・QOL・unmet needsの実態。Care deliveryギャップとworkforce不足の交差点。"},
  "1637":{bg:"外来注射がん治療中のリモート症状モニタリング（RM）が治療実施可否判断を支援できるかを検討。OPTIMACURE試験の最終結果を報告。",meth:"フランスのCentre François Baclesse での多施設RCT（OPTIMACURE）最終解析。注射剤外来治療患者でRMあり群vs通常ケア群を比較。主要アウトカム：治療日程の変更率・スタッフ業務負担・コスト。",pnt:"リモート監視でのPRO活用・care delivery効率化・staff workload軽減の実証データ。"},
  "1645":{bg:"革新的腫瘍薬剤へのアクセスは高所得国でも一様でなく、制度的障壁が存在する。ビスマルク型医療システム（社会保険型）のボスニア・ヘルツェゴビナでの政策・ガバナンス改革が薬剤アクセスにどう影響したかを報告。",meth:"2015〜2024年のボスニア・ヘルツェゴビナでの政策介入の前後比較。HTA（医療技術評価）プロセス改革・価格交渉改革・患者アクセスプログラムの導入前後のアクセス指標を解析。",pnt:"Financial toxicity・薬剤アクセス格差の政策的解決策。グローバルな視点での健康公平性。"},
  "1646":{bg:"多様な医師workforce が医療格差の解消に貢献するという仮説があるが、実証データは限られている。医師の特性（人種・民族・訓練背景）とアンダーサーブド患者へのケア提供との関連を解析。",meth:"National Clinician Scholars Programデータ。医師の人種・民族・訓練環境（安全網病院など）と、Medicaid・無保険・農村部患者へのケア提供割合の関連を解析。",pnt:"Workforce diversityとhealth equityの直接的関連。Physician workforceの多様性政策の根拠データ。"},
  "1668":{bg:"乳がんサバイバーはQOL低下・孤立・心理的苦痛を抱えるが、アクセスしやすいピアサポートは限られている。オンラインピアサポートプログラムの効果をRCTで評価（日本から）。",meth:"八戸市立市民病院での分散型多施設非盲検並行群間パイロットRCT（HOPE-BC試験）。オンラインピアサポート群vs通常ケア群を比較。主要アウトカム：QOL・心理的苦痛・孤立感。",pnt:"Patient advocacy・peer support・patient experience改善の日本からのRCTエビデンス。"},
  "1675":{bg:"農村部のがん患者は臨床試験へのアクセスが限られている。農村部の腫瘍医と患者向けに、多層的な臨床試験教育と紹介調整を組み合わせたCTNow介入のパイロット研究。",meth:"ハワイ大学Cancer Center/NCORPでのパイロット研究。農村部の腫瘍医への試験教育プログラムと患者への試験ナビゲーションを組み合わせ。試験照会率・登録率・患者の試験に対する態度変化を評価。",pnt:"地域格差・CRC/APP主導のtrial navigation・農村部患者の試験参加拡大モデル。"},
  "9012":{bg:"腫瘍医はバーンアウト以外にも不安・抑うつ等のメンタルヘルス問題を抱えている可能性があるが、グローバルな実態は不明。バーンアウト研究と並行してメンタルヘルス全体を評価するグローバル調査。",meth:"University of Miami主導の匿名グローバル調査。腫瘍科医師のバーンアウト（MBI）に加え、不安（GAD-7）・抑うつ（PHQ-9）・孤独感・職業的充実感を評価。地域別・キャリアステージ別に解析。",pnt:"Workforce wellbeing・meningの枠を超えたオンコロジストのメンタルヘルス実態。Workforce crisisの一側面。"},
  "9020":{bg:"精密腫瘍学での遺伝性腫瘍結果の伝達は心理的に困難。特に地域の遺伝カウンセラー不足が深刻な日本での多施設研究。コミュニケーションスキルトレーニングの実装とその効果を評価。",meth:"山形大学を含む多施設研究。遺伝性腫瘍結果を患者に伝達する医療者（腫瘍医・看護師・遺伝カウンセラー）を対象にコミュニケーションスキルトレーニングを実施。心理的負担・バーンアウト・患者満足度を評価。",pnt:"Patient interview・文化的背景・日本のworkforce課題と遺伝カウンセリング格差。"},
  "9033":{bg:"米国の農村部居住者は全人口の15〜19%だが、腫瘍医の10%未満しか農村部で診療していない。この格差が前立腺がんケアの公平性に与える影響と、協働教育で解消できるかを検討。",meth:"Talem Health主導の農村部・都市部の泌尿器科・プライマリケア医師向け前立腺がんケア協働教育プログラム。参加前後の知識・実践・患者紹介パターンの変化を評価。",pnt:"地域格差・workforce分布と患者アクセスの実践的解決策。rural oncology educationモデル。"},
  "12074":{bg:"進行がん患者への早期緩和ケア（EPC）はQOLを改善するが、スケールが困難。仮想（テレヘルス）・対面での症状スクリーニングを組み合わせてEPCの紹介を効率化するSTEP2パイロット試験。",meth:"Princess Margaret Cancer Centre（トロント）でのパイロット試験。外来進行がん患者にテレヘルスまたは対面での症状スクリーニング（ESAS）を実施し、閾値超過者にEPCを紹介。主要アウトカム：EPC紹介率・患者QOL・feasibility。",pnt:"Patient experience・早期緩和ケアへのアクセス・テレヘルス活用によるスケーラブルなケアモデル。"},
  "12081":{bg:"膵臓がんは罹患率・死亡率が高くQOL低下が著しいが、専門的緩和ケアへのアクセスは限られている。地域保健ワーカー（CHW）が段階的緩和ケアとケアナビゲーションを提供するパイロット研究。",meth:"Loma Linda Universityでのパイロット可能性研究。膵臓がん患者にCHWが（1）週次連絡・症状モニタリング、（2）ケアコーディネーション、（3）必要時に専門緩和ケアへ紹介を実施。主要アウトカム：feasibility・患者満足度・症状負担。",pnt:"Patient navigation・workforce効率化・緩和ケアへのアクセス格差解消。CHW主導モデルの実践。"},
  "12097":{bg:"孤独感は悪い健康アウトカムとQOL低下に関連するが、膠芽腫（GBM）患者・介護者での実態は不明。急速進行・集中治療が患者・介護者双方の孤独感に与える影響を全国調査で評価。",meth:"Harvard Medical School主導の全国オンライン調査。GBM患者・介護者を対象に孤独感（UCLA Loneliness Scale）・QOL・心理的苦痛を測定。病期・治療段階別の差異を解析。",pnt:"Patient experience・介護者のwell-being・cancer survivorship。孤立がん患者のunmet needsの実態。"},
  "11060":{bg:"乳がん治療中の就労維持介入TEAMWorkのデジタルvs印刷配布の効果比較。働くことはpatient experienceの重要な一部であり、financial toxicity予防にもつながる。",meth:"MSK Breast Serviceでの実用的比較研究。アジュバント療法中の乳がん患者にTEAMWork（冊子版 or モバイルアプリ版）を提供。就労維持率・職場での合理的配慮の活用・患者体験を評価。",pnt:"Working-age cancer患者のfinancial toxicity予防・patient experienceとしての就労。デジタルヘルス介入の実用性。"},
  "11076":{bg:"がんサバイバーシップが慢性疾患モデルへ移行する中、プライマリケア医（PCP）とのサバイバーシップケアの共有が重要。2026年版プライマリケア腫瘍学ツールキットの進化を報告。",meth:"New York Medical College - Saint Michael's Medical Centerでの実装研究。PCPへのサバイバーシップケアツールキット（心血管・内分泌・二次がんスクリーニング等）の提供・利用パターン・patient outcome改善を評価。",pnt:"Survivorship・patient centricity・care delivery modelの実践。PCPとの協働によるサバイバーシップの質改善。"},
  "11104":{bg:"腫瘍科での介護者負担は広く知られているが、患者自身が介護者のQOLをどう認識しているかは不明。造血幹細胞移植（HCT）後患者を対象に患者報告の介護者負担を評価。",meth:"Dana-Farber Cancer Instituteで同種HCT後の患者（2017〜2021年）を対象。移植後約100日・180日に患者が介護者のQOL・負担を評価するアンケートを実施。患者の心理・身体状態との関連も解析。",pnt:"Patient perspectiveから見た介護者負担。Patient experienceの新しい視点。"},
  "11113":{bg:"デジタルePROシステムは症状管理の改善を約束しているが、多様ながん集団での持続的な臨床効果のエビデンスは限られている。テキストベースePROプラットフォームの180日縦断的効果を評価。",meth:"Reimagine Care（ナッシュビル）のテキストベースePROプラットフォームを使用した701がん患者の180日追跡研究。週次の検証済み症状アンケートを送信。症状負担の経時的変化・急性期医療受診・患者体験を解析。",pnt:"ePROのリアルワールド実装・テキストベースの低バリア設計・diverse cancer populationでのPRO収集。"},

  "12073":{bg:"2016年ASCOガイドラインは進行がん患者への診断から8週以内の専任緩和ケアを推奨。それにもかかわらず、様々な人口統計グループにわたる格差が持続している。",meth:"2016–2022年全国入院サンプル（NIS）からの成人がん入院を分析。緩和ケア（PalC）をICD-10コードで同定。人種/民族・保険種別・所得・病院特性別にPalCの利用パターンと7年間の経時的傾向を分析。",pnt:"緩和ケアへのアクセスにおける人種・保険・所得格差の全国規模での経時的変化。ASCOガイドライン推奨後も格差が持続しているかを検証。"}
};

  1:"5/29（金）Friday",

function esc(s){
  if(!s) return "";
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

/* ── Summary HTML ─────────────────────── */
function sumHtml(key){
  var s = SUMS[key];
  if(!s) return "";
  var h = "";
  if(s.bg){
    h += "<div class=\"abs-sec-title\">背景</div>";
    h += "<div class=\"abs-sec-text\">" + esc(s.bg) + "</div>";
  }
  if(s.meth){
    h += "<div class=\"abs-sec-title\">方法</div>";
    h += "<div class=\"abs-sec-text\">" + esc(s.meth) + "</div>";
  }
  if(s.pnt){
    h += "<div class=\"abs-sec-title\">なぜ注目すべきか</div>";
    h += "<div class=\"abs-sec-text\">" + esc(s.pnt) + "</div>";
  }
  return h;
}

/* ── Build SESSION card ───────────────── */
function buildSession(s){
  var id    = "s" + (uid++);
  var bmId  = "sess_" + (s.tja||s.ten||id).replace(/[^a-z0-9]/gi,"_").substring(0,30);
  var bmIcon = isBM(bmId) ? "⭐" : "☆";
  var prio  = s.p === "★★★" ? "⭐⭐⭐" : s.p === "★★" ? "⭐⭐" : "";
  var tags  = (s.tags||[]).map(function(t){
    return "<span class=\"ktag\">" + esc(t) + "</span>";
  }).join("");
  var note  = s.note ? "<div class=\"cnote\">" + esc(s.note) + "</div>" : "";
  var warn  = s.warn ? "<div class=\"cwarn\">⚠ " + esc(s.warn) + "</div>" : "";
  var stream = s.st
    ? "<span class=\"sy\">📡 Live Stream</span>"
    : "<span class=\"sn\">現地のみ</span>";

  /* sub-abstracts */
  var subsHtml = "";
  if(s.subs && s.subs.length){
    subsHtml = s.subs.map(function(sub){
      var sid = "sa" + (uid++);
      var sumKey = sub.sum && SUMS[sub.sum] ? sub.sum : null;
      var sumPart = "";
      if(sumKey){
        sumPart =
          "<button class=\"sa-toggle-btn\" data-target=\"" + sid + "\">📖 日本語要約を見る</button>" +
          "<div class=\"sa-body\" id=\"" + sid + "\">" +
            "<div class=\"sa-body-text\">" + sumHtml(sumKey) + "</div>" +
          "</div>";
      }
      return "<div class=\"subabs\">" +
        "<div class=\"sa-num\">"  + esc(sub.n)    + "</div>" +
        "<div class=\"sa-ja\">"   + esc(sub.tja)  + "</div>" +
        "<div class=\"sa-en\">"   + esc(sub.ten)  + "</div>" +
        "<div class=\"sa-auth\">" + esc(sub.auth) + "</div>" +
        sumPart +
      "</div>";
    }).join("");
  }

  var timeStr = esc(s.t).replace(/\n/g,"<br>");
  return "<div class=\"card\">" +
    "<div class=\"stripe\" style=\"background:" + s.c + "\"></div>" +
    "<div class=\"cbody\">" +
      "<button class=\"bm-btn\" data-bmid=\"" + bmId + "\">" + bmIcon + "</button>" +
      "<div class=\"ctop\">" +
        "<div class=\"cmeta\">" +
          "<span class=\"ttag\">" + timeStr + "</span>" +
          "<div class=\"vtag\">" +
            "<span class=\"vdot\" style=\"background:" + s.c + "\"></span>" +
            esc(s.v) + " | " + stream +
          "</div>" +
        "</div>" +
        (prio ? "<div class=\"prio\">" + prio + "</div>" : "") +
      "</div>" +
      "<div class=\"pill\" style=\"background:" + s.pb + ";color:" + s.pc + "\">" +
        esc(s.pill) +
      "</div>" +
      "<div class=\"tja\">" + esc(s.tja) + "</div>" +
      "<div class=\"ten\">" + esc(s.ten) + "</div>" +
      (s.auth ? "<div class=\"auth\">" + esc(s.auth) + "</div>" : "") +
      "<div class=\"ktags\">" + tags + "</div>" +
      note + warn + subsHtml +
    "</div></div>";
}

/* ── Build POSTER card ────────────────── */
function buildPoster(p){
  var pid    = "p" + (uid++);
  var bmId   = "post_" + (p.num||pid).replace(/[^a-z0-9]/gi,"_").substring(0,30);
  var bmIcon = isBM(bmId) ? "⭐" : "☆";
  var prio   = p.p === "★★★" ? "⭐⭐⭐" : "⭐⭐";
  var tags   = (p.tags||[]).map(function(t){
    return "<span class=\"ktag\">" + esc(t) + "</span>";
  }).join("");
  var hasSumKey = p.sum && SUMS[p.sum];
  var sumPart = "";
  if(hasSumKey){
    sumPart =
      "<button class=\"abs-toggle\" data-target=\"abs-" + pid + "\">" +
        "<span class=\"abs-toggle-label\">📖 日本語要約を読む</span>" +
        "<span class=\"abs-toggle-hint\">(背景・方法・注目ポイント)</span>" +
        "<span class=\"abs-arr\">▼</span>" +
      "</button>" +
      "<div class=\"abs-body\" id=\"abs-" + pid + "\">" +
        sumHtml(p.sum) +
      "</div>";
  }
  return "<div class=\"pcard\">" +
    "<div class=\"pcbody\">" +
      "<div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px\">" +
        "<span class=\"pnum\">" + esc(p.num) + "</span>" +
        "<div style=\"display:flex;align-items:center;gap:8px;\">" +
        "<span style=\"font-size:13px;\">" + prio + "</span>" +
        "<button class=\"bm-btn\" style=\"position:static;font-size:20px;\" data-bmid=\"" + bmId + "\">" + bmIcon + "</button>" +
      "</div>" +
      "</div>" +
      "<div style=\"font-family:var(--mono);font-size:10px;color:var(--mut);margin-bottom:4px;\">" +
        esc(p.t) + " | " + esc(p.v) +
      "</div>" +
      "<div class=\"ptja\">" + esc(p.tja) + "</div>" +
      "<div class=\"pten\">" + esc(p.ten) + "</div>" +
      "<div class=\"pauth\">" + esc(p.auth) + "</div>" +
      "<div class=\"ktags\">" + tags + "</div>" +
      sumPart +
    "</div></div>";
}

/* ── Build MEETING card ───────────────── */
function buildMeeting(m){
  var bmId   = "meet_" + (m.org||"m").replace(/[^a-z0-9]/gi,"_").substring(0,30);
  var bmIcon = isBM(bmId) ? "⭐" : "☆";
  var dis  = (m.disease && m.disease !== "—")
    ? "<span class=\"mcard-dis\">" + esc(m.disease) + "</span><br>" : "";
  var desc = m.desc
    ? "<div class=\"mcard-desc\">" + esc(m.desc) + "</div>" : "";
  var urlPart = m.url
    ? "<a class=\"mcard-url\" href=\"" + esc(m.url) + "\" target=\"_blank\">🔗 " + esc(m.url) + "</a>" : "";
  var notePart = m.note
    ? "<div class=\"cwarn\">" + esc(m.note) + "</div>" : "";
  return "<div class=\"mcard\">" +
    "<div class=\"mcard-top\"></div>" +
    "<div class=\"mcard-body\">" +
      "<div class=\"mcard-badge\">👥 面会</div>" +
      "<div class=\"mcard-time\">" + esc(m.time)   + "</div>" +
      "<div class=\"mcard-venue\">📍 " + esc(m.venue) + "</div>" +
      "<div class=\"mcard-org\">"  + esc(m.org)    + "</div>" +
      dis +
      "<div class=\"mcard-lead\">担当: " + esc(m.lead) + "</div>" +
      desc + urlPart + notePart +
    "</div></div>";
}

/* ── Render ───────────────────────────── */
function render(){
  uid = 0;
  var content = document.getElementById("content");
  var empty   = document.getElementById("empty");
  content.innerHTML = "";
  var lastDay = null;
  var count   = 0;

  var allItems = [];
  DATA.session.forEach(function(s){
    allItems.push({day:s.day, type:"session", item:s});
  });
  DATA.poster.forEach(function(p){
    allItems.push({day:p.day, type:"poster", item:p});
  });
  MEETINGS.forEach(function(m){
    allItems.push({day:m.day, type:"meeting", item:m});
  });
  allItems.sort(function(a,b){
    if(a.day !== b.day) return a.day - b.day;
    // Within same day, sort by time string
    var ta = a.item.time || a.item.t || "";
    var tb = b.item.time || b.item.t || "";
    // Extract hour for rough sorting
    function toMin(s){
      var m = s.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if(!m) return 9999;
      var h = parseInt(m[1]); var mn = parseInt(m[2]);
      if(m[3].toUpperCase()==="PM" && h!==12) h+=12;
      if(m[3].toUpperCase()==="AM" && h===12) h=0;
      return h*60+mn;
    }
    return toMin(ta) - toMin(tb);
  });

  allItems.forEach(function(entry){
    var item = entry.item;
    var type = entry.type;

    if(activeDay !== "all" && item.day !== parseInt(activeDay,10)) return;
    if(activeType !== "all" && activeType !== "bookmarked" && type !== activeType) return;
    if(activeType === "bookmarked"){
      /* For bookmarked filter — check if any bmId matches */
      var bmCheck = false;
      if(type==="session"){ var bid="sess_"+(item.tja||item.ten||"").replace(/[^a-z0-9]/gi,"_").substring(0,30); if(isBM(bid)) bmCheck=true; }
      if(type==="poster"){ var bid2="post_"+(item.num||"").replace(/[^a-z0-9]/gi,"_").substring(0,30); if(isBM(bid2)) bmCheck=true; }
      if(type==="meeting"){ var bid3="meet_"+(item.org||"").replace(/[^a-z0-9]/gi,"_").substring(0,30); if(isBM(bid3)) bmCheck=true; }
      if(!bmCheck) return;
    }
    if(starMode && type !== "meeting" && item.p !== "★★★") return;

    if(item.day !== lastDay){
      var dl = document.createElement("div");
      dl.className = "dlbl";
      dl.textContent = DAY_LBL[item.day] || ("Day " + item.day);
      content.appendChild(dl);
      lastDay = item.day;
    }

    var div = document.createElement("div");
    if(type === "session")       div.innerHTML = buildSession(item);
    else if(type === "poster")   div.innerHTML = buildPoster(item);
    else                         div.innerHTML = buildMeeting(item);
    content.appendChild(div.firstChild);
    count++;
  });

  document.getElementById("cbar").textContent = count + " 件表示中";
  document.getElementById("cbadge").textContent =
    (DATA.session.length + DATA.poster.length + MEETINGS.length) + " 件";
  empty.style.display = count === 0 ? "block" : "none";
}

/* ── Event: day tabs ──────────────────── */
document.getElementById("dayTabs").addEventListener("click", function(e){
  var btn = e.target;
  while(btn && btn.tagName !== "BUTTON") btn = btn.parentNode;
  if(!btn || !btn.classList.contains("tab")) return;
  document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  activeDay  = btn.getAttribute("data-day");
  starMode   = false;
  document.getElementById("btnStar").classList.remove("on");
  render();
});

/* ── Event: type filters ──────────────── */
document.getElementById("frow").addEventListener("click", function(e){
  var btn = e.target;
  while(btn && btn.tagName !== "BUTTON") btn = btn.parentNode;
  if(!btn || !btn.classList.contains("fc")) return;
  document.querySelectorAll(".fc").forEach(function(b){b.classList.add("dim");});
  btn.classList.remove("dim");
  activeType = btn.getAttribute("data-t");
  starMode   = false;
  document.getElementById("btnStar").classList.remove("on");
  render();
});

/* ── Event: content delegation (abs + sub toggles) ── */
document.getElementById("content").addEventListener("click", function(e){
  /* bm-btn: bookmark toggle */
  var btn = e.target;
  while(btn && btn !== this){
    if(btn.tagName === "BUTTON" && btn.classList.contains("bm-btn")){
      var bmid = btn.getAttribute("data-bmid");
      if(bmid){ toggleBM(bmid); return; }
    }
    btn = btn.parentNode;
  }
  /* abs-toggle button (poster summary) */
  var btn2 = e.target;
  while(btn2 && btn2 !== this){
    if(btn2.tagName === "BUTTON"){
      /* poster abs-toggle */
      if(btn2.classList.contains("abs-toggle")){
        var targetId = btn2.getAttribute("data-target");
        var body = document.getElementById(targetId);
        if(body){
          var open = body.classList.toggle("open");
          btn.classList.toggle("open", open);
          var arr = btn.querySelector(".abs-arr");
          if(arr) arr.style.transform = open ? "rotate(180deg)" : "";
        }
        return;
      }
      /* sub-abstract toggle */
      if(btn2.classList.contains("sa-toggle-btn")){
        var targetId2 = btn2.getAttribute("data-target");
        var body2 = document.getElementById(targetId2);
        if(body2){
          var open2 = body2.classList.toggle("open");
          btn2.textContent = open2 ? "📖 要約を閉じる" : "📖 日本語要約を見る";
        }
        return;
      }
    }
    btn2 = btn2.parentNode;
  }
});

/* ── Event: bottom nav ────────────────── */
document.getElementById("btnTop").addEventListener("click", function(){
  window.scrollTo({top:0, behavior:"smooth"});
});
document.getElementById("btnStar").addEventListener("click", function(){
  starMode = !starMode;
  this.classList.toggle("on", starMode);
  if(starMode){
    activeDay  = "all";
    activeType = "all";
    document.querySelectorAll(".tab").forEach(function(b,i){
      b.classList.toggle("on", i === 0);
    });
    document.querySelectorAll(".fc").forEach(function(b){
      b.classList.remove("dim");
    });
  }
  render();
});
document.getElementById("btnReset").addEventListener("click", function(){
  activeDay  = "all";
  activeType = "all";
  starMode   = false;
  document.getElementById("btnStar").classList.remove("on");
  document.querySelectorAll(".tab").forEach(function(b,i){
    b.classList.toggle("on", i === 0);
  });
  document.querySelectorAll(".fc").forEach(function(b){
    b.classList.remove("dim");
  });
  render();
});

render();
</script>
</body>
